name: Test and deploy GitHub Pages

on:
  push:
    branches: [main, ui-redesign]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stable
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: ui-redesign
          path: preview
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            stable/pnpm-lock.yaml
            preview/pnpm-lock.yaml
      - name: Install stable
        working-directory: stable
        run: pnpm install --frozen-lockfile
      - name: Test stable
        working-directory: stable
        run: pnpm test
      - name: Build stable
        working-directory: stable
        run: pnpm build
      - name: Scan stable
        working-directory: stable
        run: pnpm privacy:scan
      - name: Install preview
        working-directory: preview
        run: pnpm install --frozen-lockfile
      - name: Test preview
        working-directory: preview
        run: pnpm test
      - name: Build preview
        working-directory: preview
        run: pnpm build:preview
      - name: Scan preview
        working-directory: preview
        run: pnpm privacy:scan
      - name: Add preview to Pages artifact
        run: |
          mkdir -p stable/dist/preview
          cp -a preview/dist/. stable/dist/preview/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: stable/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
